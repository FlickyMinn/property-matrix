<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Property Evaluation Matrix</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Prop Matrix">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #0f172a; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; position: relative; }
        
        .mobile-header { background: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; z-index: 2000; }
        .mobile-header h1 { font-size: 1.1rem; font-weight: 700; color: #1e3a8a; }
        .menu-toggle-btn { background: #2563eb; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        .sidebar { 
            background: white; padding: 16px; z-index: 1999; position: absolute;
            top: 53px; left: 0; right: 0; display: none; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-height: calc(100vh - 53px); overflow-y: auto;
        }
        .sidebar.show { display: block; }

        .section-title { font-size: 0.85rem; font-weight: 700; color: #1e3a8a; text-transform: uppercase; margin-top: 14px; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; letter-spacing: 0.5px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        
        .anchor-deck { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
        .slot-btn { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .slot-btn:hover { background: #e2e8f0; }
        .slot-btn.active { background: #dbeafe; color: #1e40af; border-color: #3b82f6; }
        .slot-btn.set { border-left: 4px solid #16a34a; }

        .theme-deck { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 6px; }
        .theme-btn { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .theme-btn.active { background: #1e293b; color: white; border-color: #0f172a; }

        .checkbox-group { display: flex; flex-direction: column; gap: 6px; padding: 6px 0; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .checkbox-item input { width: auto; }

        input, select, button { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; }
        button.primary { background: #2563eb; color: white; font-weight: 600; border: none; cursor: pointer; }
        button.primary:hover { background: #1d4ed8; }
        
        .matrix-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .matrix-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 0.78rem; }
        .matrix-table th, .matrix-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; vertical-align: top; }
        .matrix-table th { background: #f1f5f9; font-weight: 700; color: #475569; }
        .matrix-table tr.selected { background: #f0fdf4; border: 2px solid #22c55e; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; margin-top: 2px; }
        .badge-peak { background: #fee2e2; color: #991b1b; }
        .badge-off { background: #dcfce7; color: #166534; }

        #map { flex: 1; width: 100%; z-index: 1; }
        
        .map-legend { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); line-height: 1.5; font-size: 0.8rem; min-width: 160px; z-index: 1000; color: #334155; }
        .legend-title { font-weight: 700; margin-bottom: 4px; color: #1e3a8a; border-bottom: 1px solid #e2e8f0; padding-bottom: 2px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-top: 3px; }

        @media (min-width: 768px) {
            .mobile-header { display: none; }
            .app-container { flex-direction: row; }
            .sidebar { 
                display: flex !important; position: relative; width: 380px; height: 100%; top: 0;
                box-shadow: none; border-right: 1px solid #e2e8f0; flex-direction: column; gap: 12px; 
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="mobile-header">
            <h1>Global Matrix</h1>
            <button class="menu-toggle-btn" onclick="toggleMobileSidebar()">Menu</button>
        </div>

        <div id="sidebar" class="sidebar">
            <div class="section-title">Map Display Mode</div>
            <div class="theme-deck">
                <button id="theme-street" class="theme-btn active" onclick="switchMapStyle('street')">🗺️ Street</button>
                <button id="theme-dark" class="theme-btn" onclick="switchMapStyle('dark')">🕶️ Dark</button>
                <button id="theme-satellite" class="theme-btn" onclick="switchMapStyle('satellite')">🛰️ Satellite</button>
            </div>

            <div class="section-title">1. Search From Dynamic Pin</div>
            <div class="form-group" style="margin-top:6px; display:flex; gap:6px;">
                <input type="text" id="target-city" placeholder="Center Map: e.g. McDowall, QLD" value="McDowall, QLD">
                <button class="primary" onclick="teleportToGlobalTarget()" style="width:90px;">Go</button>
            </div>

            <div class="section-title">2. Fixed Infrastructure Anchors</div>
            <div class="anchor-deck">
                <button id="slot-work" class="slot-btn" onclick="activateSlot('work')">💼 Work Anchor</button>
                <button id="slot-school-1" class="slot-btn" onclick="activateSlot('school-1')">🏫 Anchor School</button>
                <button id="slot-hospital-1" class="slot-btn" onclick="activateSlot('hospital-1')">🏥 Anchor Hosp</button>
                <button id="slot-amenity-1" class="slot-btn" onclick="activateSlot('amenity-1')">🛒 Anchor Retail</button>
            </div>

            <div class="section-title">3. Dynamic Map Overlays</div>
            <div class="form-group" style="margin-top:6px;">
                <label style="font-size:0.75rem; font-weight:700; color:#475569;">Search Radius from Active House Pin:</label>
                <div style="display:flex; gap:6px; margin-bottom:4px; align-items:center;">
                    <input type="number" id="boundary-val" value="5" min="1" max="50" style="width: 80px;">
                    <span style="font-size:0.85rem; font-weight:600;">km</span>
                    <button class="primary" onclick="generateSearchBoundary()" style="margin-left: auto; width:130px;">Draw Radius</button>
                </div>
                
                <div class="checkbox-group" style="border-top:1px solid #f1f5f9; padding-top:8px;">
                    <div class="checkbox-item">
                        <input type="checkbox" id="layer-isochrones" onchange="toggleIsochroneAreas()" checked>
                        <label for="layer-isochrones" style="color:#d97706; font-weight:600;">⏱️ Drive Time Zones (10/20/30m)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="layer-catchments" onchange="toggleCatchmentOverlays()">
                        <label for="layer-catchments" style="color:#0369a1; font-weight:600;">🎒 School Catchments (Local)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="layer-parishes" onchange="toggleParishOverlays()">
                        <label for="layer-parishes" style="color:#7c3aed; font-weight:600;">🗺️ Parish Boundaries</label>
                    </div>
                </div>
            </div>

            <div class="section-title">4. Track Houses & Commutes</div>
            <button id="house-trigger-btn" class="primary" style="background:#0f172a; margin-top:6px;" onclick="activateHousePlacementMode()">+ Drop Prospective House Pin</button>
            
            <div class="matrix-box">
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th>Property</th>
                            <th>Work Commute</th>
                            <th>Local Anchors</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-payload">
                        <tr>
                            <td colspan="3" style="text-align:center; color:#64748b; padding:12px;">No targets tracked yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <button onclick="clearCompleteCanvas()" style="background:#64748b; color:white; border:none; margin-top:auto; padding:10px; border-radius:8px; cursor:pointer;">Reset Framework</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // OpenRouteService developer token
        const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjhhNmEwODBlYTcwNTRkMWM5MDk4ZmJiNjg2MDFkZjgxIiwiaCI6Im11cm11cjY0In0=';

        // Base Map Layer Sources
        const baseLayers = {
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© CartoDB'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '© Esri'
            })
        };

        const map = L.map('map', {
            layers: [baseLayers.street]
        }).setView([-27.3826, 152.9922], 13); // Centered on McDowall, QLD

        let boundaryLayers = L.layerGroup().addTo(map);
        let liveRoutesLayer = L.layerGroup().addTo(map);
        let overlayLayers = L.layerGroup().addTo(map);
        let isochroneLayer = L.layerGroup().addTo(map);
        let legendControl = null;
        
        let activeSlotType = null;
        let isHousePlacementActive = false;
        
        let anchors = { work: null, 'school-1': null, 'hospital-1': null, 'amenity-1': null };
        let properties = [];
        let activeBoundariesData = [];
        let selectedHouseId = null;

        const iconUrls = {
            work: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-black.png',
            'school-1': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-grey.png',
            'hospital-1': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-violet.png',
            'amenity-1': 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
            house: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png'
        };

        const routeColors = {
            work: '#dc2626',      // Red for critical Work path
            'school-1': '#2563eb',  // Blue for School
            'hospital-1': '#7c3aed',// Violet
            'amenity-1': '#ea580c'  // Orange
        };

        function createCustomIcon(type) {
            return L.icon({
                iconUrl: iconUrls[type],
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });
        }

        function switchMapStyle(style) {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`theme-${style}`).classList.add('active');
            
            for (let key in baseLayers) {
                map.removeLayer(baseLayers[key]);
            }
            baseLayers[style].addTo(map);
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        async function teleportToGlobalTarget() {
            const cityQuery = document.getElementById('target-city').value.trim();
            if(!cityQuery) return;
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cityQuery)}`);
                const data = await response.json();
                if(data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    map.setView([lat, lon], 13);
                } else { alert("Location not found."); }
            } catch(e) { alert("Geocoding failed."); }
        }

        function activateSlot(type) {
            isHousePlacementActive = false;
            document.getElementById('house-trigger-btn').style.background = '#0f172a';
            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
            
            if (activeSlotType === type) {
                activeSlotType = null;
            } else {
                activeSlotType = type;
                document.getElementById(`slot-${type}`).classList.add('active');
                if (window.innerWidth < 768) toggleMobileSidebar();
            }
        }

        function activateHousePlacementMode() {
            activeSlotType = null;
            document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
            isHousePlacementActive = !isHousePlacementActive;
            const btn = document.getElementById('house-trigger-btn');
            btn.style.background = isHousePlacementActive ? '#16a34a' : '#0f172a';
            if (isHousePlacementActive && window.innerWidth < 768) toggleMobileSidebar();
        }

        // GENERATES THE RADIUS BOUNDARY AROUND HOUSE PIN
        function generateSearchBoundary() {
            boundaryLayers.clearLayers();
            activeBoundariesData = [];
            
            const activeHouse = properties.find(p => p.id === selectedHouseId);
            if (!activeHouse) {
                alert("Please drop and select a Prospective House Pin first to serve as the search center.");
                return;
            }

            const latlng = activeHouse.marker.getLatLng();
            const val = parseFloat(document.getElementById('boundary-val').value);

            L.circle(latlng, { 
                color: '#3b82f6', 
                fillColor: '#3b82f6', 
                fillOpacity: 0.03, 
                weight: 1.5,
                dashArray: '5, 5',
                radius: val * 1000 
            }).addTo(boundaryLayers);

            activeBoundariesData.push({ label: `${val}km Physical Ring`, color: '#3b82f6' });
            updateLegendUI();

            // Fire both layers (boundary shapes + drive times) for the active house
            triggerSmartOverlayUpdates(latlng, val);
            calculateDriveTimeZones(latlng);
            
            if (window.innerWidth < 768) toggleMobileSidebar();
        }

        // CALCULATE 10, 20, AND 30-MINUTE DRIVE TIME ISOCHRONES
        async function calculateDriveTimeZones(latlng) {
            isochroneLayer.clearLayers();
            if (!document.getElementById('layer-isochrones').checked) return;

            const url = 'https://api.openrouteservice.org/v2/isochrones/driving-car';
            const body = {
                locations: [[latlng.lng, latlng.lat]],
                range: [600, 1200, 1800], // 10, 20, 30 minutes in seconds
                range_type: 'time',
                smoothing: 5
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': apiKey
                    },
                    body: JSON.stringify(body)
                });
                if (response.ok) {
                    const data = await response.json();
                    
                    // Render layers in descending order so smaller zones stack cleanly on top of larger ones
                    const colors = { 1800: '#ef4444', 1200: '#f59e0b', 600: '#10b981' };
                    const labels = { 1800: '30-Min Drive', 1200: '20-Min Drive', 600: '10-Min Drive' };
                    
                    L.geoJSON(data, {
                        style: function (feature) {
                            const range = feature.properties.value;
                            return {
                                fillOpacity: 0.06,
                                color: colors[range],
                                weight: 2,
                                fillStyle: 'solid'
                            };
                        },
                        onEachFeature: function (feature, layer) {
                            const range = feature.properties.value;
                            layer.bindPopup(`<strong>${labels[range]} Limit</strong>`);
                        }
                    }).addTo(isochroneLayer);
                }
            } catch (e) {}
        }

        // FETCH LOCALIZED CATCHMENTS/PARISHES IN THE ACTIVE VISUAL WINDOW
        function triggerSmartOverlayUpdates(centerLatLng, radiusKm) {
            overlayLayers.clearLayers();
            
            const showCatchments = document.getElementById('layer-catchments').checked;
            const showParishes = document.getElementById('layer-parishes').checked;

            if (!showCatchments && !showParishes) return;

            const boundingBox = getBoundingBox(centerLatLng.lat, centerLatLng.lng, radiusKm);

            let queryQueries = [];
            if (showCatchments) {
                queryQueries.push(`node["amenity"="school"](${boundingBox});way["amenity"="school"](${boundingBox});`);
            }
            if (showParishes) {
                queryQueries.push(`relation["boundary"="administrative"]["admin_level"="10"](${boundingBox});`);
            }

            if (queryQueries.length === 0) return;

            const overpassQuery = `[out:json][timeout:15];(${queryQueries.join('')});out geom;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(overpassQuery)}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.elements) {
                        data.elements.forEach(element => {
                            if (element.type === 'relation' && element.tags.boundary === 'administrative') {
                                renderGeoPolyline(element, '#7c3aed', `Parish: ${element.tags.name || 'Historical District'}`);
                            }
                            else if (element.tags.amenity === 'school') {
                                const lat = element.lat || (element.geometry && element.geometry[0].lat);
                                const lon = element.lon || (element.geometry && element.geometry[0].lon);
                                if (lat && lon) {
                                    L.circle([lat, lon], {
                                        color: '#0284c7',
                                        fillColor: '#0ea5e9',
                                        fillOpacity: 0.1,
                                        weight: 1,
                                        radius: 1200 // Mock 1.2km local catchment boundaries around school nodes
                                    }).addTo(overlayLayers).bindPopup(`<strong>${element.tags.name || 'School'} Catchment</strong>`);
                                }
                            }
                        });
                    }
                }).catch(() => {});
        }

        function getBoundingBox(lat, lon, radiusKm) {
            const latDelta = radiusKm / 111.0;
            const lonDelta = radiusKm / (111.0 * Math.cos(lat * Math.PI / 180));
            return `${lat - latDelta},${lon - lonDelta},${lat + latDelta},${lon + lonDelta}`;
        }

        function renderGeoPolyline(el, color, popupText) {
            if (el.geometry) {
                const coordinates = el.geometry.map(pt => [pt.lat, pt.lon]);
                L.polygon(coordinates, {
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.08,
                    weight: 2
                }).addTo(overlayLayers).bindPopup(`<strong>${popupText}</strong>`);
            }
        }

        function toggleCatchmentOverlays() { updateSearchOverlayTriggers(); }
        function toggleParishOverlays() { updateSearchOverlayTriggers(); }
        
        function toggleIsochroneAreas() {
            const activeHouse = properties.find(p => p.id === selectedHouseId);
            if (activeHouse) {
                calculateDriveTimeZones(activeHouse.marker.getLatLng());
            } else {
                isochroneLayer.clearLayers();
            }
        }

        function updateSearchOverlayTriggers() {
            const activeHouse = properties.find(p => p.id === selectedHouseId);
            if (activeHouse) {
                const val = parseFloat(document.getElementById('boundary-val').value);
                triggerSmartOverlayUpdates(activeHouse.marker.getLatLng(), val);
            }
            updateLegendUI();
        }

        function updateLegendUI() {
            if (legendControl) map.removeControl(legendControl);
            legendControl = L.control({ position: 'bottomright' });
            legendControl.onAdd = function () {
                const div = L.DomUtil.create('div', 'map-legend');
                div.innerHTML = `<div class="legend-title">Global Layer Guide</div>`;
                activeBoundariesData.forEach(b => {
                    div.innerHTML += `<div class="legend-item"><div style="width:16px; height:10px; border:2px dashed ${b.color}; background:${b.color}; opacity:0.1;"></div><span>${b.label}</span></div>`;
                });
                if (document.getElementById('layer-isochrones').checked) {
                    div.innerHTML += `<div class="legend-item"><div style="width:12px; height:12px; border-radius:50%; background:#10b981; opacity:0.6; display:inline-block;"></div><span>10m Drive Time</span></div>`;
                    div.innerHTML += `<div class="legend-item"><div style="width:12px; height:12px; border-radius:50%; background:#f59e0b; opacity:0.6; display:inline-block;"></div><span>20m Drive Time</span></div>`;
                    div.innerHTML += `<div class="legend-item"><div style="width:12px; height:12px; border-radius:50%; background:#ef4444; opacity:0.6; display:inline-block;"></div><span>30m Drive Time</span></div>`;
                }
                if (document.getElementById('layer-catchments').checked) {
                    div.innerHTML += `<div class="legend-item"><div style="width:16px; height:10px; border:1px solid #0284c7; background:#0ea5e9; opacity:0.1;"></div><span>School Catchment</span></div>`;
                }
                if (document.getElementById('layer-parishes').checked) {
                    div.innerHTML += `<div class="legend-item"><div style="width:16px; height:10px; border:1px solid #7c3aed; background:#7c3aed; opacity:0.1;"></div><span>Parish Boundary</span></div>`;
                }
                return div;
            };
            legendControl.addTo(map);
        }

        // EVALUATE MATRIX CALCULATIONS
        async function runPropertyMatrixEvaluations(prop) {
            const pLatLng = prop.marker.getLatLng();
            
            // Calculate real commute duration to Work
            if (anchors.work) {
                const wLatLng = anchors.work.marker.getLatLng();
                const url = `https://api.openrouteservice.org/v2/directions/driving-car?start=${pLatLng.lng},${pLatLng.lat}&end=${wLatLng.lng},${wLatLng.lat}`;
                try {
                    const res = await fetch(url, { headers: { 'Authorization': apiKey } });
                    if (res.ok) {
                        const data = await res.json();
                        const clearMins = Math.round(data.features[0].properties.summary.duration / 60);
                        prop.metrics.workClear = `${clearMins}m`;
                        prop.metrics.workPeak = `${Math.round(clearMins * 1.45)}m`;
                    }
                } catch(e) { }
            }

            // Calculate distance parameters to other set anchors
            let infraStrings = [];
            for (let key in anchors) {
                if (key !== 'work' && anchors[key]) {
                    const aLatLng = anchors[key].marker.getLatLng();
                    const distKm = (pLatLng.distanceTo(aLatLng) / 1000).toFixed(1);
                    const label = key === 'school-1' ? '🏫 School' : key === 'hospital-1' ? '🏥 Hosp' : '🛒 Retail';
                    infraStrings.push(`${label}: <strong>${distKm}km</strong>`);
                }
            }
            prop.metrics.localInfra = infraStrings.length > 0 ? infraStrings.join('<br>') : 'No anchors set';
            
            rebuildPayloadMatrixUI();
            if (selectedHouseId === prop.id) {
                renderLiveDrivingCommutes(prop);
            }
        }

        // DRAW INDIVIDUAL DRIVE PATHS TO EACH OF THE ACTIVE ANCHORS
        async function renderLiveDrivingCommutes(prop) {
            liveRoutesLayer.clearLayers();
            const pLatLng = prop.marker.getLatLng();

            for (let key in anchors) {
                if (anchors[key]) {
                    const targetLatLng = anchors[key].marker.getLatLng();
                    const url = `https://api.openrouteservice.org/v2/directions/driving-car?start=${pLatLng.lng},${pLatLng.lat}&end=${targetLatLng.lng},${targetLatLng.lat}`;
                    
                    try {
                        const res = await fetch(url, { headers: { 'Authorization': apiKey } });
                        if (res.ok) {
                            const data = await res.json();
                            L.geoJSON(data, {
                                style: {
                                    color: routeColors[key],
                                    weight: 4,
                                    opacity: 0.8,
                                    dashArray: key === 'work' ? null : '5, 10' // Solid line to work, dashed to other anchors
                                }
                            }).addTo(liveRoutesLayer);
                        }
                    } catch(e) {}
                }
            }
        }

        function selectHouseRow(id) {
            selectedHouseId = id;
            const targetProp = properties.find(p => p.id === id);
            if (targetProp) {
                renderLiveDrivingCommutes(targetProp);
                generateSearchBoundary(); // Redraw search boundary & isochrone zones around selected house
            }
            rebuildPayloadMatrixUI();
        }

        function rebuildPayloadMatrixUI() {
            const body = document.getElementById('matrix-payload');
            if (properties.length === 0) {
                body.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#64748b; padding:12px;">No targets tracked yet.</td></tr>`;
                return;
            }
            body.innerHTML = "";
            properties.forEach((p, idx) => {
                const isSelected = selectedHouseId === p.id ? 'class="selected"' : '';
                body.innerHTML += `
                    <tr ${isSelected} onclick="selectHouseRow(${p.id})" style="cursor:pointer;">
                        <td><strong>House #${idx+1}</strong><br><span style="font-size:0.6rem; color:#64748b;">Lat: ${p.marker.getLatLng().lat.toFixed(3)}<br>Lon: ${p.marker.getLatLng().lng.toFixed(3)}</span></td>
                        <td>
                            <span class="badge badge-off">Clear: ${p.metrics.workClear}</span><br>
                            <span class="badge badge-peak">Peak: ${p.metrics.workPeak}</span>
                        </td>
                        <td style="line-height:1.3; font-size:0.72rem;">${p.metrics.localInfra}</td>
                    </tr>
                `;
            });
        }

        function handleCanvasMapTaps(e) {
            // Context 1: Anchor Placement
            if (activeSlotType) {
                if (anchors[activeSlotType]) map.removeLayer(anchors[activeSlotType].marker);
                
                const pin = L.marker(e.latlng, { icon: createCustomIcon(activeSlotType), draggable: true }).addTo(map);
                anchors[activeSlotType] = { marker: pin, latlng: e.latlng };
                document.getElementById(`slot-${activeSlotType}`).classList.add('set');
                
                pin.on('dragend', function() {
                    properties.forEach(p => runPropertyMatrixEvaluations(p));
                });

                activateSlot(activeSlotType);
                properties.forEach(p => runPropertyMatrixEvaluations(p));
                return;
            }

            // Context 2: Prospective House Node Initialisation
            if (isHousePlacementActive) {
                const pin = L.marker(e.latlng, { icon: createCustomIcon('house'), draggable: true }).addTo(map);
                const newProperty = {
                    id: Date.now(), marker: pin,
                    metrics: { workClear: '...', workPeak: '...', localInfra: '...' }
                };
                
                properties.push(newProperty);
                selectedHouseId = newProperty.id; 
                rebuildPayloadMatrixUI();
                runPropertyMatrixEvaluations(newProperty);
                generateSearchBoundary(); // Auto-generates boundaries and isochrones instantly around the dropped pin

                pin.on('dragend', function() {
                    runPropertyMatrixEvaluations(newProperty);
                    generateSearchBoundary(); 
                });

                activateHousePlacementMode();
            }
        }

        function clearCompleteCanvas() {
            boundaryLayers.clearLayers();
            liveRoutesLayer.clearLayers();
            overlayLayers.clearLayers();
            isochroneLayer.clearLayers();
            properties.forEach(p => map.removeLayer(p.marker));
            properties = [];
            activeBoundariesData = [];
            selectedHouseId = null;
            for (let key in anchors) {
                if (anchors[key]) {
                    map.removeLayer(anchors[key].marker);
                    anchors[key] = null;
                }
                const btn = document.getElementById(`slot-${key}`);
                if(btn) btn.classList.remove('set', 'active');
            }
            document.getElementById('layer-isochrones').checked = true;
            document.getElementById('layer-catchments').checked = false;
            document.getElementById('layer-parishes').checked = false;
            activeSlotType = null;
            isHousePlacementActive = false;
            resetThemeButtons();
            document.getElementById('theme-street').classList.add('active');
            switchMapStyle('street');
            document.getElementById('house-trigger-btn').style.background = '#0f172a';
            if (legendControl) map.removeControl(legendControl);
            rebuildPayloadMatrixUI();
        }

        function resetThemeButtons() {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        }

        map.on('click', handleCanvasMapTaps);
    </script>
</body>
</html>
